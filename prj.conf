# nRF Edge AI
CONFIG_NRF_EDGEAI=y

# nRF Edge AI dependencies
CONFIG_NRF_AXON=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
CONFIG_FPU=y

# Size of interlayer buffer to fit the KWS model (see nrf_edgeai_user_model_axon.h)
CONFIG_NRF_AXON_INTERLAYER_BUFFER_SIZE=6656
CONFIG_NRF_AXON_PSUM_BUFFER_SIZE=0

# DMIC microphone
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# Logging and assert
CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_SERIAL=y
CONFIG_ASSERT=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_AUDIO_DMIC_LOG_LEVEL_WRN=y

# Keep printk off the deferred-log path so the "Keyword spotted: X" control
# line is emitted synchronously (low latency for the serial game controller).
CONFIG_LOG_PRINTK=n

# On the dongle the console runs over USB CDC ACM; silence the udc_dwc2 INFO
# spam so it does not flood the log and drop application messages. (No effect on
# the DK, which has no USB device controller.)
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y

CONFIG_SENSOR=y
CONFIG_BMI270=y
CONFIG_SENSOR_LOG_LEVEL_DBG=y

CONFIG_GPIO=y

# Bluetooth: send game commands over the Nordic UART Service (NUS)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Game Controller"
CONFIG_BT_NUS=y