# nRF Edge AI
CONFIG_NRF_EDGEAI=y

# nRF Edge AI dependencies
CONFIG_NRF_AXON=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
CONFIG_FPU=y

# Size of interlayer buffer to fit the KWS model (see nrf_edgeai_user_model_axon.h)
CONFIG_NRF_AXON_INTERLAYER_BUFFER_SIZE=6656
CONFIG_NRF_AXON_PSUM_BUFFER_SIZE=0

# DMIC microphone
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# Logging and assert
CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_SERIAL=y
CONFIG_ASSERT=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_AUDIO_DMIC_LOG_LEVEL_WRN=y

CONFIG_SENSOR=y
CONFIG_BMI270=y
CONFIG_SENSOR_LOG_LEVEL_DBG=y

CONFIG_GPIO=y